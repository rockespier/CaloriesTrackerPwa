name: CalorieTracker CI Pipeline

# Se ejecuta en cada push/PR a main y genera artefactos desplegables
# para ser consumidos por el workflow deploy.yml.
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # JOB 1: Backend (.NET 9 Minimal API)
  # ==========================================
  build-backend:
    name: Build, Test & Publish .NET API
    runs-on: self-hosted
    permissions:
      contents: read

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Restore Dependencies
      run: dotnet restore CalorieTracker.Api/CalorieTracker.Api.csproj

    - name: Build API
      run: dotnet build CalorieTracker.Api/CalorieTracker.Api.csproj --configuration Release --no-restore

    # Ejecuta los tests del proyecto CalorieTracker.Tests (xUnit + Moq)
    - name: Run Backend Tests
      run: dotnet test CalorieTracker.Tests/CalorieTracker.Tests.csproj --configuration Release --verbosity normal

    # Genera la salida desplegable en ./publish/backend
    - name: Publish API (Release)
      run: >
        dotnet publish CalorieTracker.Api/CalorieTracker.Api.csproj
        --configuration Release
        --output ./publish/backend
        --no-build

    # Empaqueta el resultado en un zip para subirlo como artefacto
    - name: Zip backend (Windows PowerShell)
      shell: powershell
      run: |
       Compress-Archive -Path ".\publish\backend\*" -DestinationPath "backend.zip" -Force
    
    - name: Upload Backend Artifact
      uses: actions/upload-artifact@v4
      with:
        name: backend-release
        path: backend.zip
        retention-days: 7

  # ==========================================
  # JOB 2: Frontend (Angular PWA)
  # ==========================================
  build-frontend:
    name: Build & Package Angular Client
    runs-on: self-hosted
    permissions:
      contents: read

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Dependencies
      working-directory: ./Angular/CalorieTracker.Client
      run: npm ci

    - name: Build Angular PWA (Production)
      working-directory: ./Angular/CalorieTracker.Client
      run: npm run build -- --configuration=production
      
    - name: Zip Frontend Artifact (Windows PowerShell)
      shell: powershell
      working-directory: ./Angular/CalorieTracker.Client
      run: |
        $zip = Join-Path $env:GITHUB_WORKSPACE "frontend.zip"
        if (Test-Path $zip) { Remove-Item $zip -Force }
        Compress-Archive -Path ".\dist\calorie-tracker.client\browser\*" -DestinationPath $zip -Force
        Write-Host "Created: $zip"
        Get-Item $zip      
        
    - name: Upload Frontend Artifact
      uses: actions/upload-artifact@v4
      with:
        name: frontend-release
        path: frontend.zip
        retention-days: 7        

