server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Enrutamiento SPA: Si no encuentra el archivo, redirige a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optimizaciones de Caché para PWA (Service Workers, Manifest, CSS, JS)
    location ~* \.(?:manifest|appcache|html?|xml|json)$ {
        expires -1;
        access_log off;
    }

    location ~* \.(?:css|js|woff2?|svg|gif|png|jpg|jpeg)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public";
    }
}